name: Executable task
description: A small feature or fix that can be implemented and verified independently.
title: "[TASK-ID] "
labels: []
body:
  - type: textarea
    id: goal
    attributes:
      label: 目标与用户价值
      description: Describe the user-visible outcome and why it matters.
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: 当前问题与证据
      description: Include reproduction steps, URLs, code locations, data, or screenshots.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望行为与范围
      description: State the intended behavior and what is explicitly out of scope.
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: 依赖关系
      description: List Blocked by, Blocks, and Parent Epic links.
  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准
      description: Use checkboxes with observable outcomes and failure states.
      value: |
        - [ ]
    validations:
      required: true
  - type: textarea
    id: tests
    attributes:
      label: 测试与验证
      value: |
        - [ ] Automated tests
        - [ ] Manual verification
    validations:
      required: true

