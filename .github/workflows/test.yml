name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run plan:validate -- --plan examples/issue-plan.example.json
      - run: npm run plan:validate -- --plan .github/issue-plans/IWF-20260722.json
