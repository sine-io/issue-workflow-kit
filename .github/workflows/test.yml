name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run plan:validate -- --plan examples/issue-plan.example.json
      - run: npm run plan:validate -- --plan examples/issue-plan.v1.1.example.json
      - run: npm run plan:validate -- --plan examples/issue-plan.v2.example.json
      - name: Validate repository plans
        run: |
          while IFS= read -r plan; do
            npm run plan:validate -- --plan "$plan"
          done < <(find .github/issue-plans -type f -name '*.json' -print)
